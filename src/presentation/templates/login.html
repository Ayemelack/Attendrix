    <style>
        :root {
            --primary: #4F46E5;
            --primary-dark: #3730A3;
            --primary-light: #818CF8;
            --accent: #06B6D4;
            --dark: #0F172A;
            --text: #1E293B;

        .lang-toggle { position: fixed; top: 1rem; right: 1rem; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); padding: 0.35rem 0.75rem; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-family: 'Inter', sans-serif; z-index: 100; transition: all 0.2s; } .lang-toggle:hover { background: rgba(255,255,255,0.1); color: #fff; }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;

            right: -30%;

            height: 700px;
            background: radial-gradient(circle, rgba(79,70,229,0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            left: -20%;

            pointer-events: none;

        .login-card {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);

            background: linear-gradient(135deg, #fff 60%, rgba(255,255,255,0.6));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            letter-spacing: -0.5px;

        .login-card .brand-subtitle {

            color: rgba(255,255,255,0.45);

        .form-check-custom {

            gap: 0.5rem;
            margin-bottom: 1.25rem;

        }

        .device-info i { font-size: 0.9rem; }

        .trust-badge {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .trust-trusted {
            background: rgba(16,185,129,0.12);
            color: #10B981;
            border: 1px solid rgba(16,185,129,0.2);
        }

        .trust-new {
            background: rgba(245,158,11,0.12);
            color: #F59E0B;
            border: 1px solid rgba(245,158,11,0.2);
        }

        .alert-custom {
            border-radius: 12px;
            border: none;
            padding: 0.85rem 1rem;
            font-size: 0.9rem;
            margin-bottom: 1.25rem;
            display: none;
        }

        .alert-error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: #FCA5A5;
        }

        .alert-success {
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.2);
            color: #6EE7B7;
        }

        .alert-info {
            background: rgba(59,130,246,0.1);
            border: 1px solid rgba(59,130,246,0.2);

        .footer-links {

        .footer-links .separator {
            color: rgba(255,255,255,0.15);

        }

        @media (max-width: 576px) {
            body { padding: 0; }
            .login-card { 
                padding: 2rem 1.5rem; 
                border-radius: 0; 
                border-left: none; 
                border-right: none; 
                border-bottom: none;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            .input-group-custom .form-control {
                min-height: 48px;
                font-size: 16px; /* Prevent iOS zoom */
            }
            .btn-primary-custom {
                min-height: 48px;
            }
        }
    </style>

<div class="login-card">
    <a href="/" class="brand">
        <div class="brand-icon"><svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" style="display:inline-block;vertical-align:-.125em"><path d="M12 6.5L3.5 21" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/><path d="M12 6.5L20.5 21" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/><path d="M5 14.5L11 14.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M13 14.5L19 14.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M9.5 9.5Q12 6.2 14.5 9.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" fill="none" opacity=".6"/><circle cx="12" cy="3.5" r="3" fill="currentColor"/><circle cx="3.5" cy="21" r="2.5" fill="currentColor"/><circle cx="20.5" cy="21" r="2.5" fill="currentColor"/></svg></div>
    <span class="brand-text">Attendrix</span>
</a>
<p class="brand-subtitle" data-i18n="enterprise_attendance">Enterprise Attendance Platform</p>

    <div class="alert-custom" id="alertContainer"></div>

        <!-- Dev Mode Hint -->
        <div class="alert-custom alert-info" id="devHint"

        <!-- Device Verification -->
        <div class="device-section" id="deviceSection">

        <form id="loginForm">
            <div class="input-group-custom">
                <label for="email" data-i18n="email">Email Address</label>
                <i class="fas fa-envelope input-icon"></i>

                       placeholder="you@institution.edu" required autocomplete="email">

            <div class="input-group-custom">
                <label for="password" data-i18n="password">Password</label>
                <i class="fas fa-lock input-icon"></i>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="Enter your password" required autocomplete="current-password">
                <button type="button" class="toggle-pw" id="togglePassword" tabindex="-1">
                    <i class="fas fa-eye"></i>
                </button>
            </div>

            <div class="input-group-custom">
                <label for="institutionId">Institution ID</label>
                <i class="fas fa-building input-icon"></i>
                <input type="text" class="form-control" id="institutionId" name="institutionId"
                       placeholder="e.g., inst_001" required value="inst_001">
            </div>

            <div class="form-check-custom">
                <input type="checkbox" id="rememberMe" name="rememberMe">
                <label for="rememberMe" data-i18n="remember_me">Remember this device</label>
            </div>

            <button type="submit" class="btn-primary-custom" id="loginBtn">

        <div class="footer-links">

                <a href="/signup" data-i18n="no_account">Create Account</a>

            <div style="margin-top:0.5rem;">
                <a href="/" data-i18n="back_home">Back to Home</a>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

<script>
    let deviceFingerprint = null;

    // ── Device Fingerprint ──
    document.addEventListener('DOMContentLoaded', async function () {
        // Use AttendrixSecurity for rich fingerprint (canvas, WebGL, etc.)
        if (window.AttendrixSecurity && AttendrixSecurity.collectAllSignals) {
            try {
                var signals = await AttendrixSecurity.collectAllSignals();
                deviceFingerprint = signals.fingerprint;
                var deviceSection = document.getElementById('deviceSection');
                var deviceInfo = document.getElementById('deviceInfo');
                if (deviceSection) deviceSection.classList.add('active');
                if (deviceInfo) deviceInfo.textContent = 'Device: ' + deviceFingerprint.substring(0, 8) + '...';
                var trusted = JSON.parse(localStorage.getItem('trustedDevices') || '[]');
                var known = trusted.some(function(d) { return d.fingerprint === deviceFingerprint; });
                var badge = document.getElementById('trustBadge');
                if (badge) {
                    badge.textContent = known ? 'Trusted' : 'New Device';
                    badge.className = 'trust-badge ' + (known ? 'trust-trusted' : 'trust-new');
                }
            } catch (e) {
                console.warn('Advanced fingerprint unavailable, using basic', e);
                await generateBasicFingerprint();
            }
        } else {
            await generateBasicFingerprint();
        }
        // Show dev hint on localhost
        if (location.hostname === '127.0.0.1' || location.hostname === 'localhost') {
            var hint = document.getElementById('devHint');
            if (hint) hint.style.display = 'block';
        }
    });

    async function generateBasicFingerprint() {
        try {
            var data = {
                ua: navigator.userAgent,
                lang: navigator.language,
                plat: navigator.platform,
                screen: screen.width + 'x' + screen.height,
                depth: screen.colorDepth,
                tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
                cores: navigator.hardwareConcurrency || 1,
                mem: navigator.deviceMemory || 0
            };
            var hash = await sha256(JSON.stringify(data));
            deviceFingerprint = hash.substring(0, 32);
            var deviceSection = document.getElementById('deviceSection');
            var deviceInfo = document.getElementById('deviceInfo');
            if (deviceSection) deviceSection.classList.add('active');
            if (deviceInfo) deviceInfo.textContent = 'Device: ' + deviceFingerprint.substring(0, 8) + '...';
            var trusted = JSON.parse(localStorage.getItem('trustedDevices') || '[]');
            var known = trusted.some(function(d) { return d.fingerprint === deviceFingerprint; });
            var badge = document.getElementById('trustBadge');
            if (badge) {
                badge.textContent = known ? 'Trusted' : 'New Device';
                badge.className = 'trust-badge ' + (known ? 'trust-trusted' : 'trust-new');
            }
        } catch (e) {
            var deviceInfo = document.getElementById('deviceInfo');
            if (deviceInfo) deviceInfo.textContent = 'Device verification unavailable';
        }
    }

    function sha256(str) {
        return crypto.subtle.digest('SHA-256', new TextEncoder().encode(str))
            .then(buf => Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join(''));
    }

    // ── Password Toggle ──
    document.getElementById('togglePassword').addEventListener('click', function () {
        const pw = document.getElementById('password');
        const icon = this.querySelector('i');
        if (pw.type === 'password') {
            pw.type = 'text';
            icon.className = 'fas fa-eye-slash';
        } else {
            pw.type = 'password';
            icon.className = 'fas fa-eye';
        }
    });

    // ── Form Submit ──
    document.getElementById('loginForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            showAlert('Please enter a valid email address', 'error'); return;
        }
        if (!password) {
            showAlert('Please enter your password', 'error'); return;
        }

        setLoading(true);
        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: email,
                    password: password,
                    institutionId: document.getElementById('institutionId').value.trim(),
                    remember_me: document.getElementById('rememberMe').checked,
                    device_fingerprint: deviceFingerprint
                })
            });
            const result = await res.json();

            if (result.success === false || result.error) {
                showAlert(result.message || result.error || 'Invalid credentials', 'error');
            } else {
                if (result.access_token) localStorage.setItem('accessToken', result.access_token);
                if (result.refresh_token) localStorage.setItem('refreshToken', result.refresh_token);
                if (result.user) localStorage.setItem('user', JSON.stringify(result.user));

                if (document.getElementById('rememberMe').checked && deviceFingerprint) {
                    const list = JSON.parse(localStorage.getItem('trustedDevices') || '[]');
                    const idx = list.findIndex(d => d.fingerprint === deviceFingerprint);
                    const entry = { fingerprint: deviceFingerprint, ua: navigator.userAgent, lastUsed: new Date().toISOString() };
                    if (idx >= 0) list[idx] = entry; else list.push(entry);
                    localStorage.setItem('trustedDevices', JSON.stringify(list));
                }

                showAlert('Welcome back! Redirecting...', 'success');
                setTimeout(() => {
                    if (result.user && result.user.role) {
                        const routes = {
                            super_admin: '/institutional-admin/dashboard',
                            institutional_admin: '/institutional-admin/dashboard',
                            lecturer: '/lecturer/dashboard',
                            student: '/student/dashboard'
                        };
                        var role = (result.user.role || '').toLowerCase();
                        window.location.href = routes[role] || '/login';
                    } else {
                        window.location.href = '/login';
                    }
                }, 1000);
            }
        } catch (err) {
            showAlert('Connection error. Please try again.', 'error');
        } finally {
            setLoading(false);
        }
    });

    // ── Forgot Password ──
    document.getElementById('forgotPwLink').addEventListener('click', function (e) {
        e.preventDefault();
        showAlert('Password reset will be available soon.', 'info');
    });

    // ── Helpers ──
    function showAlert(msg, type) {
        const c = document.getElementById('alertContainer');
        c.className = 'alert-custom alert-' + type;
        c.innerHTML = '<i class="fas fa-' + (type === 'error' ? 'exclamation-circle' : 'check-circle') + ' me-2"></i>' + msg;
        c.style.display = 'block';
        setTimeout(() => { c.style.display = 'none'; }, 5000);
    }

    function setLoading(loading) {
        const s = document.getElementById('loginSpinner');
        const t = document.getElementById('loginBtnText');
        const b = document.getElementById('loginBtn');
        s.style.display = loading ? 'inline-block' : 'none';
        t.textContent = loading ? 'Signing In...' : 'Sign In';
        b.disabled = loading;
    }
</script>
