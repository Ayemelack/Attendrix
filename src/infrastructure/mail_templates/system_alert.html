<tr>
    <td align="center" style="padding:36px 30px 0;">
        <table cellpadding="0" cellspacing="0" border="0" style="display:inline-block;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:100px;">
            <tr>
                <td style="padding:6px 16px;font-size:13px;font-weight:600;color:#EF4444;letter-spacing:0.5px;">System Alert</td>
            </tr>
        </table>
    </td>
</tr>
<tr>
    <td align="center" style="padding:20px 30px 8px;">
        <h1 style="margin:0;font-size:24px;font-weight:800;color:#0F172A;letter-spacing:-0.5px;">$alert_title</h1>
    </td>
</tr>
<tr>
    <td style="padding:0 30px 24px;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#FEF2F2;border-radius:12px;border:1px solid #FECACA;">
            <tr>
                <td style="padding:16px 20px;">
                    <p style="margin:0;font-size:15px;color:#991B1B;line-height:1.6;">
                        $alert_message
                    </p>
                </td>
            </tr>
        </table>
    </td>
</tr>
<tr>
    <td style="padding:0 30px 24px;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#F8FAFC;border-radius:12px;border:1px solid #E2E8F0;">
            <tr>
                <td style="padding:16px 20px;">
                    <p style="margin:0;font-size:12px;color:#94A3B8;">
                        <strong>Severity:</strong> $alert_severity
                    </p>
                    <p style="margin:4px 0 0;font-size:12px;color:#94A3B8;">
                        <strong>Timestamp:</strong> $alert_timestamp
                    </p>
                    <p style="margin:4px 0 0;font-size:12px;color:#94A3B8;">
                        <strong>Component:</strong> $alert_component
                    </p>
                </td>
            </tr>
        </table>
    </td>
</tr>
