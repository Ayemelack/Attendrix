<tr>
    <td align="center" style="padding:36px 30px 0;">
        <table cellpadding="0" cellspacing="0" border="0" style="display:inline-block;background:rgba(79,70,229,0.1);border:1px solid rgba(79,70,229,0.2);border-radius:100px;">
            <tr>
                <td style="padding:6px 16px;font-size:13px;font-weight:600;color:#4F46E5;letter-spacing:0.5px;">Attendance Recorded</td>
            </tr>
        </table>
    </td>
</tr>
<tr>
    <td align="center" style="padding:20px 30px 8px;">
        <h1 style="margin:0;font-size:24px;font-weight:800;color:#0F172A;letter-spacing:-0.5px;">Attendance Notification</h1>
    </td>
</tr>
<tr>
    <td align="center" style="padding:0 30px 24px;">
        <p style="margin:0;font-size:15px;color:#64748B;line-height:1.6;">
            Hi <strong style="color:#1E293B;">$recipient_name</strong>, your attendance has been recorded for <strong style="color:#1E293B;">$course_name</strong>.
        </p>
    </td>
</tr>
<tr>
    <td style="padding:0 30px;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0"><tr><td style="border-top:1px solid #E2E8F0;font-size:0;line-height:0;">&nbsp;</td></tr></table>
    </td>
</tr>
<tr>
    <td style="padding:24px 30px;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0">
            <tr>
                <td style="padding-bottom:12px;font-size:14px;color:#64748B;width:40%;">Session</td>
                <td style="padding-bottom:12px;font-size:14px;font-weight:700;color:#0F172A;">$session_name</td>
            </tr>
            <tr>
                <td style="padding-bottom:12px;font-size:14px;color:#64748B;">Date</td>
                <td style="padding-bottom:12px;font-size:14px;font-weight:700;color:#0F172A;">$session_date</td>
            </tr>
            <tr>
                <td style="padding-bottom:12px;font-size:14px;color:#64748B;">Status</td>
                <td style="padding-bottom:12px;font-size:14px;font-weight:700;color:$status_color;">$attendance_status</td>
            </tr>
            <tr>
                <td style="font-size:14px;color:#64748B;">Course</td>
                <td style="font-size:14px;font-weight:700;color:#0F172A;">$course_name</td>
            </tr>
        </table>
    </td>
</tr>
